<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Digital Bouquet</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(circle at bottom, #1b2735 0%, #090a0f 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      canvas {
        display: block;
      }
      #message {
        position: absolute;
        top: 15%;
        width: 100%;
        text-align: center;
        color: rgba(255, 255, 255, 0.8);
        pointer-events: none;
        opacity: 0;
        animation: fadeIn 3s ease-in-out forwards 1s;
      }
      h1 {
        font-weight: 300;
        letter-spacing: 2px;
        margin: 0;
      }
      p {
        font-size: 0.9rem;
        opacity: 0.7;
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="message">
      <h1>A Bouquet for You 💐</h1>
      <p>Click anywhere to plant a flower exactly there</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      let width, height;
      let flowers = [];
      let stars = [];

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);
      resize();

      // Generate night sky
      for (let i = 0; i < 150; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 1.5,
          alpha: Math.random(),
          speed: Math.random() * 0.02,
        });
      }

      // Find a spot without overlapping existing flowers (used for auto-spawning)
      function getValidTarget(baseX, baseY, spreadX, spreadY, requiredRadius) {
        let attempts = 0;
        const maxAttempts = 150;

        while (attempts < maxAttempts) {
          let testX = baseX + (Math.random() - 0.5) * spreadX;
          let testY = baseY + (Math.random() - 0.5) * spreadY;

          if (
            testX < 50 ||
            testX > width - 50 ||
            testY < 100 ||
            testY > height - 100
          ) {
            attempts++;
            continue;
          }

          let hasOverlap = false;
          for (let i = 0; i < flowers.length; i++) {
            let dx = testX - flowers[i].targetX;
            let dy = testY - flowers[i].targetY;
            let distance = Math.sqrt(dx * dx + dy * dy);
            let minAllowedDistance = requiredRadius + 70 * flowers[i].scale;

            if (distance < minAllowedDistance) {
              hasOverlap = true;
              break;
            }
          }

          if (!hasOverlap) {
            return { x: testX, y: testY };
          }
          attempts++;
        }
        return { x: width / 2 + (Math.random() - 0.5) * 200, y: height / 2 };
      }

      class Flower {
        constructor(
          targetX,
          targetY,
          specificType = null,
          specificScale = null,
        ) {
          this.startX = width / 2;
          this.startY = height + 50;
          this.x = this.startX;
          this.y = this.startY;
          this.targetX = targetX;
          this.targetY = targetY;

          this.cpX = this.startX + (Math.random() - 0.5) * 200;
          this.cpY = this.startY - (this.startY - this.targetY) / 2;

          this.progress = 0;
          this.growthRate = 0.006 + Math.random() * 0.004;
          this.bloomProgress = 0;

          this.type = specificType !== null ? specificType : Math.floor(Math.random() * 3);
          this.scale = specificScale !== null ? specificScale : 0.6 + Math.random() * 0.4;

          const colors = [
            ["#ff4d4d", "#cc0000"], // Tulips (Red front, Dark red shade)
            ["#ffcc00", "#ff9900"], // Sunflowers (Yellow front, Orange back)
            ["#ffffff", "#ffd1dc"], // Lilies (White base, Pink shade)
          ];
          this.color = colors[this.type];
          this.stemColor = `rgb(46, ${100 + Math.random() * 50}, 46)`;
        }

        update() {
          if (this.progress < 1) {
            this.progress += this.growthRate;
            if (this.progress >= 1) this.progress = 1;
            const t = this.progress;
            this.x = (1 - t) * (1 - t) * this.startX + 2 * (1 - t) * t * this.cpX + t * t * this.targetX;
            this.y = (1 - t) * (1 - t) * this.startY + 2 * (1 - t) * t * this.cpY + t * t * this.targetY;
          } else if (this.bloomProgress < 1) {
            this.bloomProgress += 0.015;
            if (this.bloomProgress >= 1) this.bloomProgress = 1;
          }
        }

        draw() {
          // Stem
          ctx.beginPath();
          ctx.moveTo(this.startX, this.startY);
          ctx.quadraticCurveTo(this.cpX, this.cpY, this.x, this.y);
          ctx.strokeStyle = this.stemColor;
          ctx.lineWidth = 4 * this.scale;
          ctx.lineCap = "round";
          ctx.stroke();

          // Leaves
          if (this.progress > 0.5) {
            ctx.fillStyle = this.stemColor;
            const leafX = (1 - 0.5) * (1 - 0.5) * this.startX + 2 * (1 - 0.5) * 0.5 * this.cpX + 0.5 * 0.5 * this.targetX;
            const leafY = (1 - 0.5) * (1 - 0.5) * this.startY + 2 * (1 - 0.5) * 0.5 * this.cpY + 0.5 * 0.5 * this.targetY;

            ctx.beginPath();
            ctx.ellipse(leafX + 10, leafY, 15 * this.scale * this.progress, 5 * this.scale * this.progress, Math.PI / 4, 0, Math.PI * 2);
            ctx.fill();
          }

          // Flower Head
          if (this.progress === 1 && this.bloomProgress > 0) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.bloomProgress * this.scale, this.bloomProgress * this.scale);

            if (this.type === 0) {
              // Tulip (Upgraded for realism)
              const mainColor = this.color[0];
              const shadeColor = this.color[1];

              // Back/inner petal
              ctx.fillStyle = shadeColor;
              ctx.beginPath();
              ctx.moveTo(0, 5);
              ctx.bezierCurveTo(-10, -15, -8, -35, 0, -40);
              ctx.bezierCurveTo(8, -35, 10, -15, 0, 5);
              ctx.fill();

              // Left outer petal
              ctx.fillStyle = mainColor;
              ctx.beginPath();
              ctx.moveTo(0, 12);
              ctx.bezierCurveTo(-25, 5, -25, -25, -12, -38);
              ctx.bezierCurveTo(-5, -20, -2, -5, 0, 12);
              ctx.fill();
              ctx.strokeStyle = shadeColor;
              ctx.lineWidth = 0.5;
              ctx.stroke();

              // Right outer petal
              ctx.fillStyle = mainColor;
              ctx.beginPath();
              ctx.moveTo(0, 12);
              ctx.bezierCurveTo(25, 5, 25, -25, 12, -38);
              ctx.bezierCurveTo(5, -20, 2, -5, 0, 12);
              ctx.fill();
              ctx.stroke();

              // Front center petal
              ctx.fillStyle = mainColor;
              ctx.beginPath();
              ctx.moveTo(-7, 10);
              ctx.bezierCurveTo(-15, -10, -8, -32, 0, -35);
              ctx.bezierCurveTo(8, -32, 15, -10, 7, 10);
              ctx.quadraticCurveTo(0, 15, -7, 10);
              ctx.fill();
              ctx.stroke();
            } 
            
            else if (this.type === 1) {
              // Sunflower
              ctx.fillStyle = this.color[1];
              for (let i = 0; i < 16; i++) {
                ctx.rotate((Math.PI * 2) / 16);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(8, -15, 0, -28);
                ctx.quadraticCurveTo(-8, -15, 0, 0);
                ctx.fill();
              }
              ctx.fillStyle = this.color[0];
              for (let i = 0; i < 16; i++) {
                ctx.rotate((Math.PI * 2) / 16 + 0.2);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(6, -12, 0, -24);
                ctx.quadraticCurveTo(-6, -12, 0, 0);
                ctx.fill();
              }
              ctx.fillStyle = "#3d2314";
              ctx.beginPath();
              ctx.arc(0, 0, 11, 0, Math.PI * 2);
              ctx.fill();
              ctx.fillStyle = "#5c3a21";
              for(let i=0; i<35; i++) {
                 let r = 7 + Math.random()*3;
                 let angle = Math.random() * Math.PI * 2;
                 ctx.beginPath();
                 ctx.arc(Math.cos(angle)*r, Math.sin(angle)*r, 0.8, 0, Math.PI*2);
                 ctx.fill();
              }
            } 
            
            else if (this.type === 2) {
              // Lily 
              const petalColor = this.color[0];
              const innerShade = this.color[1];

              for (let i = 0; i < 6; i++) {
                ctx.rotate((Math.PI * 2) / 6);
                ctx.fillStyle = petalColor;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(15, -10, 12, -35, 0, -45);
                ctx.bezierCurveTo(-12, -35, -15, -10, 0, 0);
                ctx.fill();

                ctx.strokeStyle = innerShade;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(0, -30);
                ctx.stroke();

                ctx.fillStyle = "#c94062";
                for(let d = 0; d < 5; d++){
                   ctx.beginPath();
                   ctx.arc((Math.random() - 0.5) * 10, -8 - Math.random() * 15, 0.7, 0, Math.PI * 2);
                   ctx.fill();
                }
              }

              ctx.fillStyle = "#b3d9b3";
              ctx.beginPath();
              ctx.arc(0, 0, 3, 0, Math.PI * 2);
              ctx.fill();

              ctx.strokeStyle = "#e6f2a7";
              ctx.lineWidth = 1.2;
              for (let i = 0; i < 5; i++) {
                let angle = (Math.PI * 2 / 5) * i;
                let len = 14 + Math.random() * 5;
                let ex = Math.cos(angle) * len;
                let ey = Math.sin(angle) * len;
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(ex, ey);
                ctx.stroke();

                ctx.fillStyle = "#d97b29";
                ctx.save();
                ctx.translate(ex, ey);
                ctx.rotate(angle + Math.PI / 2);
                ctx.beginPath();
                ctx.ellipse(0, 0, 1.5, 3.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
              }
            }
            ctx.restore();
          }
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);

        stars.forEach((star) => {
          star.alpha += star.speed;
          if (star.alpha > 1 || star.alpha < 0.2) star.speed *= -1;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
          ctx.fill();
        });

        flowers.forEach((flower) => {
          flower.update();
          flower.draw();
        });

        requestAnimationFrame(animate);
      }

      function initBouquet() {
        const numInitialFlowers = 4;
        for (let i = 0; i < numInitialFlowers; i++) {
          setTimeout(() => {
            let pos = getValidTarget(width / 2, height / 2 + 50, 700, 300, 60);
            flowers.push(new Flower(pos.x, pos.y));
          }, i * 400); 
        }

        setTimeout(() => {
          for (let i = 0; i < 2; i++) {
            setTimeout(() => {
              let pos = getValidTarget(width / 2, height / 2 - 50, 700, 250, 120);
              flowers.push(new Flower(pos.x, pos.y, 2, 1.8));
            }, i * 400);
          }
        }, numInitialFlowers * 400);
      }

      // Plant new flower EXACTLY where clicked
      canvas.addEventListener("click", (e) => {
        flowers.push(new Flower(e.clientX, e.clientY));
      });

      // Plant new flower on ANY key press
      window.addEventListener("keydown", () => {
        let pos = getValidTarget(width / 2, height / 2, width * 0.8, height * 0.6, 70);
        if (Math.random() > 0.8) {
          flowers.push(new Flower(pos.x, pos.y, 2, 1.8));
        } else {
          flowers.push(new Flower(pos.x, pos.y));
        }
      });

      initBouquet();
      animate();
    </script>
  </body>
</html>

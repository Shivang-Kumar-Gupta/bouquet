<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Digital Bouquet</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(circle at bottom, #1b2735 0%, #090a0f 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      canvas {
        display: block;
      }
      #message {
        position: absolute;
        top: 15%;
        width: 100%;
        text-align: center;
        color: rgba(255, 255, 255, 0.8);
        pointer-events: none;
        opacity: 0;
        animation: fadeIn 3s ease-in-out forwards 1s;
      }
      h1 {
        font-weight: 300;
        letter-spacing: 2px;
        margin: 0;
      }
      p {
        font-size: 0.9rem;
        opacity: 0.7;
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="message">
      <h1>A Bouquet for You 💐</h1>
      <p>Click or press any key to plant more flowers</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      let width, height;
      let flowers = [];
      let stars = [];

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);
      resize();

      // Generate night sky
      for (let i = 0; i < 150; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 1.5,
          alpha: Math.random(),
          speed: Math.random() * 0.02,
        });
      }

      // Find a spot without overlapping existing flowers
      function getValidTarget(baseX, baseY, spreadX, spreadY, requiredRadius) {
        let attempts = 0;
        const maxAttempts = 150;

        while (attempts < maxAttempts) {
          let testX = baseX + (Math.random() - 0.5) * spreadX;
          let testY = baseY + (Math.random() - 0.5) * spreadY;

          // Keep inside screen bounds
          if (
            testX < 50 ||
            testX > width - 50 ||
            testY < 100 ||
            testY > height - 100
          ) {
            attempts++;
            continue;
          }

          let hasOverlap = false;
          for (let i = 0; i < flowers.length; i++) {
            let dx = testX - flowers[i].targetX;
            let dy = testY - flowers[i].targetY;
            let distance = Math.sqrt(dx * dx + dy * dy);

            let minAllowedDistance = requiredRadius + 70 * flowers[i].scale;

            if (distance < minAllowedDistance) {
              hasOverlap = true;
              break;
            }
          }

          if (!hasOverlap) {
            return { x: testX, y: testY };
          }
          attempts++;
        }
        return { x: width / 2 + (Math.random() - 0.5) * 200, y: height / 2 };
      }

      class Flower {
        constructor(
          targetX,
          targetY,
          specificType = null,
          specificScale = null,
        ) {
          this.startX = width / 2;
          this.startY = height + 50;
          this.x = this.startX;
          this.y = this.startY;
          this.targetX = targetX;
          this.targetY = targetY;

          this.cpX = this.startX + (Math.random() - 0.5) * 200;
          this.cpY = this.startY - (this.startY - this.targetY) / 2;

          this.progress = 0;
          this.growthRate = 0.006 + Math.random() * 0.004; // Controls stem speed
          this.bloomProgress = 0;

          this.type =
            specificType !== null
              ? specificType
              : Math.floor(Math.random() * 3);
          this.scale =
            specificScale !== null ? specificScale : 0.6 + Math.random() * 0.4;

          const colors = [
            ["#ff4d4d", "#cc0000"], // Tulips
            ["#ffcc00", "#ff9900"], // Sunflowers
            ["#ffffff", "#ffd1dc"], // Lilies
          ];
          this.color = colors[this.type];
          this.stemColor = `rgb(46, ${100 + Math.random() * 50}, 46)`;
        }

        update() {
          // Phase 1: Grow the stem
          if (this.progress < 1) {
            this.progress += this.growthRate;
            if (this.progress >= 1) {
              this.progress = 1; // Clamp to exactly 1
            }
            const t = this.progress;
            this.x =
              (1 - t) * (1 - t) * this.startX +
              2 * (1 - t) * t * this.cpX +
              t * t * this.targetX;
            this.y =
              (1 - t) * (1 - t) * this.startY +
              2 * (1 - t) * t * this.cpY +
              t * t * this.targetY;
          }
          // Phase 2: Bloom the flower head (only starts after stem is done)
          else if (this.bloomProgress < 1) {
            this.bloomProgress += 0.015; // Controls bloom speed
            if (this.bloomProgress >= 1) {
              this.bloomProgress = 1; // Clamp
            }
          }
        }

        draw() {
          // Stem
          ctx.beginPath();
          ctx.moveTo(this.startX, this.startY);
          ctx.quadraticCurveTo(this.cpX, this.cpY, this.x, this.y);
          ctx.strokeStyle = this.stemColor;
          ctx.lineWidth = 4 * this.scale;
          ctx.lineCap = "round";
          ctx.stroke();

          // Leaves
          if (this.progress > 0.5) {
            ctx.fillStyle = this.stemColor;
            const leafX =
              (1 - 0.5) * (1 - 0.5) * this.startX +
              2 * (1 - 0.5) * 0.5 * this.cpX +
              0.5 * 0.5 * this.targetX;
            const leafY =
              (1 - 0.5) * (1 - 0.5) * this.startY +
              2 * (1 - 0.5) * 0.5 * this.cpY +
              0.5 * 0.5 * this.targetY;

            ctx.beginPath();
            ctx.ellipse(
              leafX + 10,
              leafY,
              15 * this.scale * this.progress,
              5 * this.scale * this.progress,
              Math.PI / 4,
              0,
              Math.PI * 2,
            );
            ctx.fill();
          }

          // Flower Head
          if (this.progress === 1 && this.bloomProgress > 0) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(
              this.bloomProgress * this.scale,
              this.bloomProgress * this.scale,
            );

            if (this.type === 0) {
              // Tulip
              ctx.fillStyle = this.color[0];
              ctx.beginPath();
              ctx.moveTo(0, 10);
              ctx.quadraticCurveTo(-20, -10, -15, -30);
              ctx.quadraticCurveTo(0, -20, 0, -10);
              ctx.quadraticCurveTo(0, -20, 15, -30);
              ctx.quadraticCurveTo(20, -10, 0, 10);
              ctx.fill();
            } else if (this.type === 1) {
              // Sunflower
              ctx.fillStyle = this.color[0];
              for (let i = 0; i < 12; i++) {
                ctx.rotate((Math.PI * 2) / 12);
                ctx.beginPath();
                ctx.ellipse(0, -15, 6, 15, 0, 0, Math.PI * 2);
                ctx.fill();
              }
              ctx.fillStyle = "#4a3311";
              ctx.beginPath();
              ctx.arc(0, 0, 12, 0, Math.PI * 2);
              ctx.fill();
            } else if (this.type === 2) {
              // Lily
              ctx.fillStyle = this.color[0];
              for (let i = 0; i < 6; i++) {
                ctx.rotate((Math.PI * 2) / 6);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(15, -15, 0, -35);
                ctx.quadraticCurveTo(-15, -15, 0, 0);
                ctx.fill();
                ctx.strokeStyle = this.color[1];
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(0, -25);
                ctx.stroke();
              }
              ctx.strokeStyle = "#ffcc00";
              for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo((Math.random() - 0.5) * 15, -15 - Math.random() * 5);
                ctx.stroke();
              }
            }
            ctx.restore();
          }
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);

        stars.forEach((star) => {
          star.alpha += star.speed;
          if (star.alpha > 1 || star.alpha < 0.2) star.speed *= -1;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
          ctx.fill();
        });

        flowers.forEach((flower) => {
          flower.update();
          flower.draw();
        });

        requestAnimationFrame(animate);
      }

      // Automatic initial bloom
      function initBouquet() {
        const numInitialFlowers = 4; // Plant 4 regular flowers first
        for (let i = 0; i < numInitialFlowers; i++) {
          setTimeout(() => {
            let pos = getValidTarget(width / 2, height / 2 + 50, 700, 300, 60);
            flowers.push(new Flower(pos.x, pos.y));
          }, i * 400); // Stagger them so they grow one by one
        }

        setTimeout(() => {
          // Add 2 big lilies after the regular ones
          for (let i = 0; i < 2; i++) {
            setTimeout(() => {
              let pos = getValidTarget(
                width / 2,
                height / 2 - 50,
                700,
                250,
                120,
              );
              flowers.push(new Flower(pos.x, pos.y, 2, 1.8));
            }, i * 400);
          }
        }, numInitialFlowers * 400);
      }

      // Plant new flower on click
      canvas.addEventListener("click", (e) => {
        let pos = getValidTarget(e.clientX, e.clientY, 150, 150, 70);
        flowers.push(new Flower(pos.x, pos.y));
      });

      // Plant new flower on ANY key press
      window.addEventListener("keydown", () => {
        let pos = getValidTarget(
          width / 2,
          height / 2,
          width * 0.8,
          height * 0.6,
          70,
        );
        // 20% chance to spawn a big lily on key press, otherwise random
        if (Math.random() > 0.8) {
          flowers.push(new Flower(pos.x, pos.y, 2, 1.8));
        } else {
          flowers.push(new Flower(pos.x, pos.y));
        }
      });

      // Start
      initBouquet();
      animate();
    </script>
  </body>
</html>
